# ── Server ──────────────────────────────────────────────────────────────────
PORT: 8080
HTTP_WORKERS: 2

# ── URLs (standalone local mode) ─────────────────────────────────────────────
# These must be reachable from the user's browser, not from inside Docker.
# For local dev: use localhost + the exposed ports.
# For production: replace with your real domain names.
API_URL: http://localhost:8081
FRONTEND_URL: http://localhost:8080
PROXY_PART: http://localhost:8082

# ── Database ─────────────────────────────────────────────────────────────────
# Hostname is the Docker service name (internal DNS).
hibernate.connection.url: jdbc:postgresql://postgres:5432/piped
hibernate.connection.driver_class: org.postgresql.Driver
hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
hibernate.connection.username: piped
hibernate.connection.password: changeme

# ── BG Helper (PoToken supplier — reduces throttling) ────────────────────────
BG_HELPER_URL: http://bg-helper:3000

# ── Feed / Registration ───────────────────────────────────────────────────────
FEED_RETENTION: 30
DISABLE_REGISTRATION: false
COMPROMISED_PASSWORD_CHECK: false

# ── SponsorBlock ──────────────────────────────────────────────────────────────
SPONSORBLOCK_SERVERS: https://sponsor.ajay.app

# ── RYD (Return YouTube Dislike) ──────────────────────────────────────────────
DISABLE_RYD: false
RYD_PROXY_URL: https://ryd-proxy.kavin.rocks

# ── Consent cookie (needed in EU / some regions) ─────────────────────────────
CONSENT_COOKIE: true

# ── Disable LBRY (not needed for TV app) ─────────────────────────────────────
DISABLE_LBRY: true

# ── Timers ────────────────────────────────────────────────────────────────────
DISABLE_TIMERS: false
